<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f5f1e9">
  <title>舒尔特方格</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e9;
      --panel: #ffffff;
      --ink: #1b1f24;
      --muted: #626a72;
      --line: #d9d2c3;
      --accent: #126f6b;
      --accent-strong: #0c5753;
      --warn: #b44a2a;
      --ok: #2e7d4f;
      --tile: #fbfaf6;
      --tile-done: #dfe4e2;
      --shadow: 0 18px 48px rgba(27, 31, 36, .12);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(18, 111, 107, .12), transparent 34%),
        radial-gradient(circle at 90% 12%, rgba(180, 74, 42, .12), transparent 28%),
        var(--bg);
      color: var(--ink);
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app {
      width: min(100%, 720px);
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 14px max(12px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: clamp(8px, 1.5dvh, 14px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(18, 111, 107, .35);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(18, 111, 107, .18) 1px, transparent 1px),
        linear-gradient(rgba(18, 111, 107, .18) 1px, transparent 1px),
        #fffdf8;
      background-size: 14px 14px;
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.72);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      min-width: 0;
      border: 1px solid rgba(98, 106, 114, .18);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      padding: 10px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      margin-top: 5px;
      font-size: 20px;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .board-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .board-shell {
      width: min(100%, calc(100dvh - 205px));
      height: auto;
      max-width: 560px;
      aspect-ratio: 1;
      border: 1px solid rgba(98, 106, 114, .24);
      border-radius: 8px;
      background: rgba(255, 255, 255, .82);
      padding: clamp(7px, 1.8vw, 14px);
      box-shadow: var(--shadow);
    }

    .board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: clamp(6px, 1.6vw, 10px);
    }

    .tile {
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--tile);
      color: var(--ink);
      font-weight: 750;
      font-size: clamp(20px, 7.8vw, 42px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 5px 0 rgba(98, 106, 114, .18);
      transition: transform .08s ease, background .12s ease, border-color .12s ease, color .12s ease, opacity .12s ease;
      touch-action: manipulation;
      user-select: none;
    }

    .tile:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(98, 106, 114, .22);
    }

    .tile.done {
      border-color: transparent;
      background: var(--tile-done);
      color: transparent;
      box-shadow: none;
      pointer-events: none;
    }

    .tile.miss {
      animation: miss .18s ease;
    }

    .tile.hit {
      animation: hit .2s ease;
    }

    @keyframes miss {
      0%, 100% { transform: translateX(0); border-color: var(--line); }
      30% { transform: translateX(-4px); border-color: var(--warn); }
      65% { transform: translateX(4px); border-color: var(--warn); }
    }

    @keyframes hit {
      0% { transform: scale(1); }
      55% { transform: scale(.94); background: #d6eee3; }
      100% { transform: scale(1); }
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .primary,
    .icon-btn,
    .mode button {
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid rgba(98, 106, 114, .22);
      background: #fffdf8;
      box-shadow: 0 6px 18px rgba(27, 31, 36, .08);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 0 16px;
    }

    .primary:active,
    .icon-btn:active,
    .mode button:active {
      transform: translateY(1px);
    }

    .side-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 48px;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .icon-btn svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.3;
    }

    .mode {
      display: grid;
      grid-template-columns: repeat(2, 46px);
      border: 1px solid rgba(98, 106, 114, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .5);
      padding: 3px;
    }

    .mode button {
      min-height: 38px;
      border: 0;
      box-shadow: none;
      color: var(--muted);
      font-weight: 700;
      background: transparent;
    }

    .mode button.active {
      background: #fffdf8;
      color: var(--accent-strong);
      box-shadow: 0 3px 10px rgba(27, 31, 36, .08);
    }

    .archive {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      max-height: min(72dvh, 520px);
      z-index: 11;
      border: 1px solid rgba(98, 106, 114, .18);
      border-radius: 8px;
      background: #fffdf8;
      padding: 12px;
      display: none;
      gap: 10px;
      overflow: auto;
      overscroll-behavior: contain;
      box-shadow: 0 24px 70px rgba(0,0,0,.22);
    }

    .archive.show {
      display: grid;
    }

    .archive-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .archive-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .ghost {
      min-height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(98, 106, 114, .22);
      background: #fffdf8;
      color: var(--muted);
      padding: 0 10px;
      font-size: 13px;
    }

    .archive-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }

    .archive-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      background: rgba(27, 31, 36, .26);
    }

    .archive-backdrop.show {
      display: block;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .metric {
      min-width: 0;
      border: 1px solid rgba(98, 106, 114, .16);
      border-radius: 8px;
      background: rgba(255, 253, 248, .86);
      padding: 9px 8px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 18px;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .state-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 8px;
      background: rgba(18, 111, 107, .08);
      padding: 10px;
      color: var(--accent-strong);
      font-size: 14px;
      line-height: 1.35;
    }

    .history {
      display: grid;
      gap: 6px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 42px 1fr 48px 66px;
      gap: 8px;
      align-items: center;
      min-height: 32px;
      border-top: 1px solid rgba(98, 106, 114, .14);
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .history-row:first-child {
      border-top: 0;
    }

    .history-row strong {
      color: var(--ink);
      font-size: 15px;
    }

    .result {
      position: fixed;
      inset: 0;
      display: none;
      place-items: end center;
      padding: 16px;
      background: rgba(27, 31, 36, .28);
      z-index: 10;
    }

    .result.show {
      display: grid;
    }

    .dialog {
      width: min(100%, 440px);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      padding: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,.24);
    }

    .dialog h2 {
      margin: 0 0 14px;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .result-cell {
      border: 1px solid rgba(98, 106, 114, .2);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
    }

    .result-cell span {
      color: var(--muted);
      display: block;
      font-size: 12px;
    }

    .result-cell strong {
      display: block;
      margin-top: 5px;
      font-size: 19px;
      font-variant-numeric: tabular-nums;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .dialog-actions button {
      min-height: 46px;
      border-radius: 8px;
      font-weight: 700;
    }

    .dialog-actions button:first-child {
      background: #ece7dc;
    }

    .dialog-actions button:last-child {
      background: var(--accent);
      color: #fff;
    }

    @media (max-width: 380px) {
      .app {
        padding-left: 12px;
        padding-right: 12px;
        gap: 10px;
      }

      h1 {
        font-size: 20px;
      }

      .mark {
        width: 38px;
        height: 38px;
      }

      .stat {
        padding: 8px 7px;
      }

      .stat strong {
        font-size: 18px;
      }

      .controls {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .side-controls {
        justify-content: flex-end;
      }

      .mode {
        grid-template-columns: repeat(2, 40px);
      }

      .archive-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .history-row {
        grid-template-columns: 34px 1fr 42px 58px;
        font-size: 12px;
      }

      .result-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tile,
      .primary,
      .icon-btn,
      .mode button {
        transition: none;
      }

      .tile.miss,
      .tile.hit {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>舒尔特方格</h1>
          <div class="subtitle">经典 5×5</div>
        </div>
      </div>
    </header>

    <section class="stats" aria-label="成绩">
      <div class="stat">
        <span>时间</span>
        <strong id="time">0.00</strong>
      </div>
      <div class="stat">
        <span>失误</span>
        <strong id="misses">0</strong>
      </div>
      <div class="stat">
        <span>最佳</span>
        <strong id="best">--</strong>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board-shell">
        <div class="board" id="board" aria-label="数字方格"></div>
      </div>
    </section>

    <section class="controls" aria-label="控制">
      <button class="primary" id="start">开始</button>
      <div class="side-controls">
        <button class="icon-btn" id="openArchive" aria-label="档案" title="档案">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M4 19V5"></path>
            <path d="M4 19h16"></path>
            <path d="M8 16v-5"></path>
            <path d="M12 16V8"></path>
            <path d="M16 16v-3"></path>
          </svg>
        </button>
        <button class="icon-btn" id="reset" aria-label="重开" title="重开">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"></path>
            <path d="M3 4v6h6"></path>
          </svg>
        </button>
        <div class="mode" aria-label="模式">
          <button type="button" id="modeClassic" class="active">5×5</button>
          <button type="button" id="modeSmall">4×4</button>
        </div>
      </div>
    </section>

    <section class="archive" aria-label="个人档案">
      <div class="archive-head">
        <h2 class="archive-title">个人档案</h2>
        <div class="archive-actions">
          <button class="ghost" id="clearHistory" type="button">清空</button>
          <button class="ghost" id="closeArchive" type="button">收起</button>
        </div>
      </div>
      <div class="archive-grid">
        <div class="metric">
          <span>局数</span>
          <strong id="totalGames">0</strong>
        </div>
        <div class="metric">
          <span>平均</span>
          <strong id="averageScore">--</strong>
        </div>
        <div class="metric">
          <span>中位</span>
          <strong id="medianScore">--</strong>
        </div>
        <div class="metric">
          <span>近5局</span>
          <strong id="recentAverage">--</strong>
        </div>
      </div>
      <div class="state-line" id="stateLine">完成几局后，这里会显示你的正常水平。</div>
      <div class="history" id="history"></div>
    </section>
  </main>

  <div class="archive-backdrop" id="archiveBackdrop" aria-hidden="true"></div>

  <div class="result" id="result" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="dialog">
      <h2 id="resultTitle">完成</h2>
      <div class="result-grid">
        <div class="result-cell">
          <span>时间</span>
          <strong id="finalTime">0.00</strong>
        </div>
        <div class="result-cell">
          <span>失误</span>
          <strong id="finalMisses">0</strong>
        </div>
        <div class="result-cell">
          <span>准确</span>
          <strong id="finalAccuracy">100%</strong>
        </div>
        <div class="result-cell">
          <span>状态</span>
          <strong id="finalState">--</strong>
        </div>
      </div>
      <div class="dialog-actions">
        <button id="closeResult">收起</button>
        <button id="again">再来</button>
      </div>
    </div>
  </div>

  <script>
    const board = document.querySelector("#board");
    const startButton = document.querySelector("#start");
    const resetButton = document.querySelector("#reset");
    const timeText = document.querySelector("#time");
    const missesText = document.querySelector("#misses");
    const bestText = document.querySelector("#best");
    const result = document.querySelector("#result");
    const finalTime = document.querySelector("#finalTime");
    const finalMisses = document.querySelector("#finalMisses");
    const finalAccuracy = document.querySelector("#finalAccuracy");
    const finalState = document.querySelector("#finalState");
    const closeResult = document.querySelector("#closeResult");
    const again = document.querySelector("#again");
    const modeClassic = document.querySelector("#modeClassic");
    const modeSmall = document.querySelector("#modeSmall");
    const subtitle = document.querySelector(".subtitle");
    const openArchive = document.querySelector("#openArchive");
    const closeArchive = document.querySelector("#closeArchive");
    const archiveBackdrop = document.querySelector("#archiveBackdrop");
    const clearHistory = document.querySelector("#clearHistory");
    const totalGames = document.querySelector("#totalGames");
    const averageScore = document.querySelector("#averageScore");
    const medianScore = document.querySelector("#medianScore");
    const recentAverage = document.querySelector("#recentAverage");
    const stateLine = document.querySelector("#stateLine");
    const history = document.querySelector("#history");

    const state = {
      size: 5,
      next: 1,
      misses: 0,
      started: false,
      finished: false,
      startTime: 0,
      elapsed: 0,
      rafId: 0
    };

    const bestKey = () => `schulte-best-${state.size}`;
    const historyKey = () => `schulte-history-${state.size}`;

    function readBest() {
      try {
        return Number(localStorage.getItem(bestKey()) || 0);
      } catch {
        return 0;
      }
    }

    function writeBest(value) {
      try {
        localStorage.setItem(bestKey(), String(Math.round(value)));
      } catch {
        // Some local-file mobile browsers disable storage.
      }
    }

    function readHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey()) || "[]");
        return Array.isArray(parsed) ? parsed.filter((item) => item && Number.isFinite(item.time)) : [];
      } catch {
        return [];
      }
    }

    function writeHistory(records) {
      try {
        localStorage.setItem(historyKey(), JSON.stringify(records.slice(0, 300)));
      } catch {
        // Some local-file mobile browsers disable storage.
      }
    }

    function clearCurrentHistory() {
      try {
        localStorage.removeItem(historyKey());
        localStorage.removeItem(bestKey());
      } catch {
        // Some local-file mobile browsers disable storage.
      }
    }

    function shuffle(values) {
      const list = [...values];
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function formatTime(ms) {
      return (ms / 1000).toFixed(2);
    }

    function average(records) {
      if (!records.length) return 0;
      return records.reduce((sum, item) => sum + item.time, 0) / records.length;
    }

    function median(records) {
      if (!records.length) return 0;
      const values = records.map((item) => item.time).sort((a, b) => a - b);
      const middle = Math.floor(values.length / 2);
      if (values.length % 2) return values[middle];
      return (values[middle - 1] + values[middle]) / 2;
    }

    function describeState(time, baseline) {
      if (!baseline) return "样本不足";
      const ratio = time / baseline;
      if (ratio <= 0.9) return "明显更快";
      if (ratio <= 0.97) return "偏快";
      if (ratio <= 1.05) return "正常";
      if (ratio <= 1.15) return "偏慢";
      return "明显偏慢";
    }

    function stateSentence(records) {
      if (!records.length) return "完成几局后，这里会显示你的正常水平。";
      if (records.length < 5) return `已记录 ${records.length} 局；再多测几局，中位数会更稳。`;

      const normal = median(records);
      const latest = records[0].time;
      const recent = average(records.slice(0, Math.min(5, records.length)));
      const latestState = describeState(latest, normal);
      const recentState = describeState(recent, normal);
      return `最近一局 ${latestState}，近5局 ${recentState}；你的正常水平约 ${formatTime(normal)} 秒。`;
    }

    function setBest() {
      const records = readHistory();
      const historyBest = records.length ? Math.min(...records.map((item) => item.time)) : 0;
      const best = historyBest || readBest();
      bestText.textContent = best ? formatTime(best) : "--";
    }

    function renderArchive() {
      const records = readHistory();
      const recent = records.slice(0, Math.min(5, records.length));
      totalGames.textContent = String(records.length);
      averageScore.textContent = records.length ? formatTime(average(records)) : "--";
      medianScore.textContent = records.length ? formatTime(median(records)) : "--";
      recentAverage.textContent = recent.length ? formatTime(average(recent)) : "--";
      stateLine.textContent = stateSentence(records);

      if (!records.length) {
        history.innerHTML = "";
        return;
      }

      history.innerHTML = records.slice(0, 5).map((item, index) => {
        const date = new Date(item.createdAt);
        const time = Number.isNaN(date.getTime())
          ? ""
          : date.toLocaleDateString("zh-CN", { month: "numeric", day: "numeric" });
        return `
          <div class="history-row">
            <span>#${records.length - index}</span>
            <strong>${formatTime(item.time)}</strong>
            <span>${item.misses} 误</span>
            <span>${time}</span>
          </div>
        `;
      }).join("");
    }

    function saveResult(elapsed, accuracy) {
      const records = readHistory();
      records.unshift({
        time: Math.round(elapsed),
        misses: state.misses,
        accuracy,
        size: state.size,
        createdAt: new Date().toISOString()
      });
      writeHistory(records);
    }

    function showArchive() {
      renderArchive();
      document.querySelector(".archive").classList.add("show");
      archiveBackdrop.classList.add("show");
    }

    function hideArchive() {
      document.querySelector(".archive").classList.remove("show");
      archiveBackdrop.classList.remove("show");
    }

    function drawBoard() {
      const max = state.size * state.size;
      board.style.gridTemplateColumns = `repeat(${state.size}, minmax(0, 1fr))`;
      board.style.gridTemplateRows = `repeat(${state.size}, minmax(0, 1fr))`;
      board.innerHTML = "";

      shuffle(Array.from({ length: max }, (_, index) => index + 1)).forEach((value) => {
        const tile = document.createElement("button");
        tile.className = "tile";
        tile.type = "button";
        tile.dataset.value = String(value);
        tile.textContent = value;
        tile.setAttribute("aria-label", String(value));
        board.append(tile);
      });

    }

    function resetGame(options = {}) {
      cancelAnimationFrame(state.rafId);
      state.next = 1;
      state.misses = 0;
      state.started = false;
      state.finished = false;
      state.startTime = 0;
      state.elapsed = 0;
      timeText.textContent = "0.00";
      missesText.textContent = "0";
      startButton.textContent = "开始";
      result.classList.remove("show");
      drawBoard();
      setBest();
      renderArchive();
      if (options.startNow) startTimer();
    }

    function tick(now) {
      if (!state.started || state.finished) return;
      state.elapsed = now - state.startTime;
      timeText.textContent = formatTime(state.elapsed);
      state.rafId = requestAnimationFrame(tick);
    }

    function startTimer() {
      if (state.started || state.finished) return;
      state.started = true;
      state.startTime = performance.now();
      startButton.textContent = "进行中";
      state.rafId = requestAnimationFrame(tick);
    }

    function finishGame() {
      state.finished = true;
      cancelAnimationFrame(state.rafId);
      const elapsed = Math.max(1, performance.now() - state.startTime);
      state.elapsed = elapsed;
      timeText.textContent = formatTime(elapsed);
      startButton.textContent = "完成";

      const attempts = state.size * state.size + state.misses;
      const accuracy = Math.round((state.size * state.size / attempts) * 100);
      const previousRecords = readHistory();
      const previousNormal = median(previousRecords);
      saveResult(elapsed, accuracy);

      const best = readBest();
      if (!best || elapsed < best) writeBest(elapsed);
      setBest();
      renderArchive();

      finalTime.textContent = formatTime(elapsed);
      finalMisses.textContent = String(state.misses);
      finalAccuracy.textContent = `${accuracy}%`;
      finalState.textContent = describeState(elapsed, previousNormal);
      result.classList.add("show");
      vibrate(35);
    }

    function vibrate(ms) {
      if ("vibrate" in navigator) navigator.vibrate(ms);
    }

    function flash(tile, className) {
      tile.classList.remove(className);
      void tile.offsetWidth;
      tile.classList.add(className);
    }

    board.addEventListener("click", (event) => {
      const tile = event.target.closest(".tile");
      if (!tile || state.finished) return;

      const value = Number(tile.dataset.value);
      if (value === state.next) {
        if (!state.started) startTimer();
        flash(tile, "hit");
        tile.classList.add("done");
        state.next += 1;

        const max = state.size * state.size;
        if (state.next > max) {
          finishGame();
          return;
        }

      } else {
        state.misses += 1;
        missesText.textContent = String(state.misses);
        flash(tile, "miss");
        vibrate(18);
      }
    });

    startButton.addEventListener("click", () => {
      if (state.finished) {
        resetGame({ startNow: true });
        return;
      }
      if (!state.started) startTimer();
    });

    resetButton.addEventListener("click", () => resetGame());
    closeResult.addEventListener("click", () => result.classList.remove("show"));
    again.addEventListener("click", () => resetGame({ startNow: true }));
    openArchive.addEventListener("click", showArchive);
    closeArchive.addEventListener("click", hideArchive);
    archiveBackdrop.addEventListener("click", hideArchive);
    clearHistory.addEventListener("click", () => {
      if (!confirm("清空当前模式的所有记录？")) return;
      clearCurrentHistory();
      setBest();
      renderArchive();
    });
    result.addEventListener("click", (event) => {
      if (event.target === result) result.classList.remove("show");
    });

    function setMode(size) {
      if (state.size === size) return;
      state.size = size;
      modeClassic.classList.toggle("active", size === 5);
      modeSmall.classList.toggle("active", size === 4);
      subtitle.textContent = size === 5 ? "经典 5×5" : "快速 4×4";
      resetGame();
    }

    modeClassic.addEventListener("click", () => setMode(5));
    modeSmall.addEventListener("click", () => setMode(4));

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && state.started && !state.finished) {
        cancelAnimationFrame(state.rafId);
      } else if (!document.hidden && state.started && !state.finished) {
        const shownAt = performance.now();
        state.startTime = shownAt - state.elapsed;
        state.rafId = requestAnimationFrame(tick);
      }
    });

    document.addEventListener("touchmove", (event) => {
      if (event.target.closest(".archive")) return;
      event.preventDefault();
    }, { passive: false });

    resetGame();
  </script>
</body>
</html>
